name: core_inventory
description: CoreInventory - Warehouse Staff Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Barcode Scanner
  mobile_scanner: ^3.5.6

  # Charts
  fl_chart: ^0.66.2

  # Network Status
  connectivity_plus: ^5.0.2

  # PDF generation & sharing
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
